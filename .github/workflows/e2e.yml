name: e2e

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boson:
    runs-on: ubuntu-latest
    env:
      BOSON_API_KEY: ${{ secrets.BOSON_API_KEY }}
      BOSON_E2E_ARTIFACT_DIR: e2e-artifacts
    steps:
      - uses: actions/checkout@v6

      - name: Check Boson secret
        run: test -n "$BOSON_API_KEY"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Boson real e2e tests
        run: uv run pytest -m e2e

      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boson-e2e-audio
          path: e2e-artifacts
          if-no-files-found: ignore
