name: e2e

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider e2e suite to run
        required: true
        type: choice
        options:
          - boson
          - bytedance
          - all
        default: boson

permissions:
  contents: read

jobs:
  boson:
    if: ${{ inputs.provider == 'boson' || inputs.provider == 'all' }}
    runs-on: ubuntu-latest
    env:
      BOSON_API_KEY: ${{ secrets.BOSON_API_KEY }}
      BOSON_E2E_ARTIFACT_DIR: e2e-artifacts
    steps:
      - uses: actions/checkout@v6

      - name: Check Boson secret
        run: test -n "$BOSON_API_KEY"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Boson real e2e tests
        run: uv run pytest livekit-plugins/livekit-plugins-boson/tests/test_tts_e2e.py

      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boson-e2e-audio
          path: e2e-artifacts
          if-no-files-found: ignore

  bytedance:
    if: ${{ inputs.provider == 'bytedance' || inputs.provider == 'all' }}
    runs-on: ubuntu-latest
    env:
      VOLCENGINE_TTS_V3_API_KEY: ${{ secrets.VOLCENGINE_TTS_V3_API_KEY }}
      VOLCENGINE_TTS_V3_RESOURCE_ID: ${{ secrets.VOLCENGINE_TTS_V3_RESOURCE_ID }}
      VOLCENGINE_TTS_V3_SPEAKER: ${{ secrets.VOLCENGINE_TTS_V3_SPEAKER }}
      BYTEDANCE_E2E_ARTIFACT_DIR: e2e-artifacts
    steps:
      - uses: actions/checkout@v6

      - name: Check Volcengine TTS V3 secrets
        run: test -n "$VOLCENGINE_TTS_V3_API_KEY"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ByteDance real e2e tests
        run: uv run pytest livekit-plugins/livekit-plugins-bytedance/tests/test_bytedance_tts_e2e.py

      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bytedance-e2e-audio
          path: e2e-artifacts
          if-no-files-found: ignore
