name: publish-pypi-bytedance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish livekit-plugins-bytedance
    runs-on: ubuntu-latest
    environment: pypi-bytedance
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build --package livekit-plugins-bytedance --no-sources

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
